name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: true

    - name: Build Win32
      run: |
        rustup toolchain install stable-i686-pc-windows-msvc
        cd resvg\c-api && cargo +stable-i686-pc-windows-msvc build --release --target-dir Win32

    - name: Build x64
      run: |
        cd resvg\c-api && cargo +stable-x86_64-pc-windows-msvc build --release --target-dir x64

    - name: Copy files
      run: |
        mkdir upload
        mkdir upload\resvg
        mkdir upload\Win32
        mkdir upload\x64
        copy resvg\c-api\resvg.h upload\resvg
        copy resvg\c-api\Win32\release\resvg.lib upload\Win32
        copy resvg\c-api\x64\release\resvg.lib upload\x64

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: resvg-lib
        path: upload
