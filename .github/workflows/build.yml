name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: true

    - name: Build x64
      run: |
        cd resvg\c-api && cargo +stable-x86_64-pc-windows-msvc build --release --target-dir x64

    - name: Build x86
      run: |
        rustup toolchain install stable-i686-pc-windows-msvc
        cd resvg\c-api && cargo +stable-i686-pc-windows-msvc build --release --target-dir Win32

    - name: Copy files
      run: |
        mkdir lib
        copy resvg\c-api\x64\release\resvg.lib lib\resvg-x64.lib
        copy resvg\c-api\Win32\release\resvg.lib lib\resvg-Win32.lib

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: resvg
        path: lib
